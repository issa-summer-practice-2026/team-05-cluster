changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
        - feat

    - title: 🐛 Bug Fixes
      labels:
        - fix
        - bug
        - bugfix

    - title: 🧰 Backend
      labels:
        - backend

    - title: 🖥️ Frontend
      labels:
        - frontend

    - title: 📚 Documentation
      labels:
        - docs
        - documentation

    - title: 🧪 Tests & CI
      labels:
        - test
        - ci
        - build

    - title: 🧹 Maintenance
      labels:
        - chore
        - refactor
        - dependencies

    - title: 🔧 Other Changes
      labels:
        - "*"
